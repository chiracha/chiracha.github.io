<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบฟอร์มข้อมูลพนักงาน (แก้ไขข้อผิดพลาด Widths)</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>

    <style>
        * {
            box-sizing: border-box;
            font-family: 'Sarabun', sans-serif;
        }

        body {
            background-color: #f4f6f9;
            padding: 30px;
            margin: 0;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: #ffffff;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        h2 {
            text-align: center;
            color: #333;
            margin-bottom: 25px;
            font-size: 26px;
            font-weight: 600;
        }

        .table-responsive {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 20px;
        }

        th, td {
            border: 1px solid #e0e0e0;
            padding: 12px;
            font-size: 16px;
        }

        th {
            background-color: #4A90E2;
            color: white;
            font-weight: 600;
            text-align: center;
        }

        td {
            text-align: center;
        }

        input[type="text"], input[type="tel"] {
            width: 100%;
            padding: 8px 12px;
            border: 1px solid #ccc;
            border-radius: 4px;
            outline: none;
            font-size: 16px;
            transition: border 0.2s;
        }

        input[type="text"]:focus, input[type="tel"]:focus {
            border-color: #4A90E2;
        }

        .btn-group {
            display: flex;
            justify-content: space-between;
            margin-top: 20px;
        }

        button {
            padding: 10px 25px;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.2s;
            font-weight: 500;
        }

        .btn-add {
            background-color: #2ECC71;
            color: white;
        }

        .btn-add:hover {
            background-color: #27AE60;
        }

        .btn-pdf {
            background-color: #E74C3C;
            color: white;
        }

        .btn-pdf:hover {
            background-color: #C0392B;
        }

        .btn-delete {
            background-color: #ff4d4d;
            color: white;
            padding: 6px 12px;
            font-size: 14px;
            border-radius: 4px;
        }

        .btn-delete:hover {
            background-color: #cc0000;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>📝 ฟอร์มบันทึกข้อมูลพนักงาน</h2>
    
    <div class="table-responsive">
        <table id="employeeTable">
            <thead>
                <tr>
                    <th style="width: 8%;">ลำดับที่</th>
                    <th style="width: 22%;">รหัสประจำตัวพนักงาน</th>
                    <th style="width: 35%;">ชื่อ-นามสกุล</th>
                    <th style="width: 20%;">เบอร์โทร</th>
                    <th style="width: 15%;">จัดการ</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td class="row-number">1</td>
                    <td><input type="text" class="emp-id" placeholder="เช่น EMP001"></td>
                    <td><input type="text" class="emp-name" placeholder="นาย สมชาย สายลุย"></td>
                    <td><input type="tel" class="emp-phone" placeholder="0812345678"></td>
                    <td><button type="button" class="btn-delete" onclick="deleteRow(this)">ลบ</button></td>
                </tr>
            </tbody>
        </table>
    </div>

    <div class="btn-group">
        <button type="button" class="btn-add" onclick="addRow()">➕ เพิ่มแถวข้อมูล</button>
        <button type="button" class="btn-pdf" onclick="generatePDF()">📕 ส่งออกเป็น PDF (ภาษาไทย)</button>
    </div>
</div>

<script>
    function addRow() {
        const table = document.getElementById("employeeTable").getElementsByTagName('tbody')[0];
        const rowCount = table.rows.length;
        const row = table.insertRow(rowCount);

        const cell1 = row.insertCell(0);
        const cell2 = row.insertCell(1);
        const cell3 = row.insertCell(2);
        const cell4 = row.insertCell(3);
        const cell5 = row.insertCell(4);

        cell1.className = "row-number";
        cell1.innerHTML = rowCount + 1;
        cell2.innerHTML = '<input type="text" class="emp-id" placeholder="รหัสพนักงาน">';
        cell3.innerHTML = '<input type="text" class="emp-name" placeholder="ชื่อ-นามสกุล">';
        cell4.innerHTML = '<input type="tel" class="emp-phone" placeholder="เบอร์โทร">';
        cell5.innerHTML = '<button type="button" class="btn-delete" onclick="deleteRow(this)">ลบ</button>';
        
        updateRowNumbers();
    }

    function deleteRow(button) {
        const table = document.getElementById("employeeTable").getElementsByTagName('tbody')[0];
        if (table.rows.length > 1) {
            const row = button.parentNode.parentNode;
            row.parentNode.removeChild(row);
            updateRowNumbers();
        } else {
            alert("ต้องมีข้อมูลอย่างน้อย 1 แถวครับ");
        }
    }

    function updateRowNumbers() {
        const rows = document.querySelectorAll(".row-number");
        rows.forEach((row, index) => {
            row.innerText = index + 1;
        });
    }

    async function generatePDF() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();

        // ดึงข้อมูลพนักงานจากหน้าเว็บมาก่อน
        const tableBody = [];
        const rows = document.querySelectorAll("#employeeTable tbody tr");
        
        rows.forEach((row) => {
            const num = row.querySelector(".row-number").innerText;
            const id = row.querySelector(".emp-id").value.trim();
            const name = row.querySelector(".emp-name").value.trim();
            const phone = row.querySelector(".emp-phone").value.trim();
            tableBody.push([num, id, name, phone]);
        });

        // ดึงชุดฟอนต์ภาษาไทยแบบ Web-safe .ttf จาก Google Fonts CDN โดยตรง เพื่อแก้ปัญหาโครงสร้าง 'widths' หาย
        try {
            const response = await fetch('https://fonts.gstatic.com/s/sarabun/v13/2s77Fas94TUC8SFXuv840g.ttf');
            const blob = await response.blob();
            
            const reader = new FileReader();
            reader.readAsDataURL(blob);
            reader.onloadend = function () {
                const base64data = reader.result.split(',')[1];
                
                // ลงทะเบียนฟอนต์ภาษาไทยเข้าสู่ระบบเสมือนของ jsPDF
                doc.addFileToVFS('Sarabun-Regular.ttf', base64data);
                doc.addFont('Sarabun-Regular.ttf', 'Sarabun-Regular', 'normal');
                doc.setFont('Sarabun-Regular');

                // พิมพ์หัวข้อรายงานเป็นภาษาไทย
                doc.setFontSize(22);
                doc.text("รายงานข้อมูลพนักงาน", 14, 18);

                // พิมพ์ตารางด้วย AutoTable พร้อมฟอนต์ที่แก้ไขแล้ว
                renderAutoTable(doc, tableBody, 'Sarabun-Regular');
            };
        } catch (error) {
            console.warn("ไม่สามารถเรียกฟอนต์เสริมได้ ระบบจะแปลงข้อมูลโดยใช้ฟอนต์สากลเพื่อป้องกันหน้าค้าง", error);
            // กรณีออฟไลน์/ติดสิทธิ์ระบบความปลอดภัย ให้สลับไปใช้หัวข้อภาษาอังกฤษเพื่อไม่ให้ปุ่มค้าง
            doc.setFontSize(18);
            doc.text("Employee Information Report", 14, 18);
            renderAutoTable(doc, tableBody, 'Helvetica');
        }
    }

    // แยกฟังก์ชันจัดทำตารางเพื่อความเป็นระเบียบและเสถียรภาพสูงสุด
    function renderAutoTable(doc, dataBody, fontStyleName) {
        const isThaiFont = fontStyleName === 'Sarabun-Regular';
        const headers = isThaiFont 
            ? [['ลำดับที่', 'รหัสประจำตัวพนักงาน', 'ชื่อ-นามสกุล', 'เบอร์โทร']]
            : [['No.', 'Employee ID', 'Name-Surname', 'Phone Number']];

        doc.autoTable({
            startY: 25,
            head: headers,
            body: dataBody,
            styles: { 
                font: fontStyleName, 
                fontSize: isThaiFont ? 14 : 11,
                halign: 'center',
                valign: 'middle'
            },
            headStyles: { 
                fillColor: [74, 144, 226],
                textColor: [255, 255, 255],
                fontStyle: 'normal'
            },
            columnStyles: {
                2: { halign: 'left' } // บังคับคอลัมน์ชื่อพนักงานชิดซ้าย
            },
            theme: 'grid'
        });

        doc.save('รายงานข้อมูลพนักงาน.pdf');
    }
</script>

</body>
</html>
